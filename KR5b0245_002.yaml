  text: 太上靈寶十方應號天尊懴卷之十被十
  hash: sha256:76a8b46f70d15fb33c91464e74708c3830fa98e2fff7bc859e41ca236464f73d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0245_HFL_002-001a, image: hfl/0296/0296-200.png}
body:
  text: 師尊父母品太上告妙行真人曰一切衆生受大道天地而化育而託質於父母其父母提攜乳哺寒暑晦明備極養育及乎成長即染習惡趣淫荒嗜好喜怒悲惱三業十惡六情六塵六入六識六根六賊內外漸染積成愆纍沉墮於棄賢雜惡世界淪沒於生死愛河幽牢地獄種種苦處雖具人事與夫飛走無異也若不因師為其破疑毀滯開執除惑示以三乘大法百千妙戒經籙符圖罪福齋法長生祕訣度世羽書方便級引檢制修行自邇及遐超凡入聖結無量之緣拔有纍之軀上薦七祖下濟羣生是以師尊有度世之恩父母有生身之德恩德巍巍廣大無邊固合行思遵敬動懷孝養奈何衆生劣薄自取沉淪事奉師尊父母曽無柔順恭謹侍養孝愛始卒違息先後無間動生怨結盡成愆過不懷度丗之愧不起生身之報若於諸惡斯罪益重如無回向何以蠲原今日某乙覺悔首謝自從無始以來至于今丗或捨身受法奉道求師為已及人廣傳經戒無奉師之意乏信向之心負約違科積咎增過又或於父母失恭敬孝養之心忘生身乳哺之德如上之罪無量無邊結在隂冥招其報對並仗廣大威神無窮惠力令得洗懴諸罪消潰善根增長若亡者再生人中道緣堅固速悟真乘常得安和不墮惡道一心歸命懇志虔切奉為師尊父母信禮十方大慈無上尊志心信禮大聖至真元始天尊志心信禮玄智逺照天尊志心信禮德化遐荒天尊志心信禮浮紫霞天尊志心信禮大乘空慧天尊志心信禮萬行圓滿天尊志心信禮大洞淵寂天尊志心信禮悟萬法天尊志心信禮瓊瑶蓋天尊志心信禮斷迷惑天尊志心信禮幽賜無極天尊志心信禮領衆靈天尊志心信禮和神物天尊志心信禮法雲流潤天尊志心信禮棲真至隱天尊志心信禮志端妙天尊志心信禮妙福無邊天尊志心信禮證道源天尊志心信禮延光像天尊志心信禮道含育天尊志心信禮大光照天尊志心信禮勸法無礙天尊志心信禮法緣濟天尊志心信禮真相具足天尊志心信禮太微光天尊志心信禮保慶應權天尊志心信禮玉京垂惠天尊志心信禮湛寂凝玄天尊志心信禮行圓虛界天尊志心信禮權輿方便天尊志心信禮神真妙閟天尊志心信禮應緣常濟天尊志心信禮導丗無為天尊志心信禮輪萬法天尊志心信禮光德圓天尊志心信禮無量增益天尊志心信禮沖和淨樂天尊志心信禮玄隱無為天尊志心信禮幽源不測天尊志心信禮道慧圓天尊志心信禮大慈悲救苦真人志心信禮大慈悲拔罪真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人歸依十方無丄天尊諸大真聖某乙今日發無上道意仗其大慈之力應號如意伏願前生今丗授道師尊巳神未聖已達未達道心堅固萬試不干速入大乘證真常道不生不滅無淪無壞又願曩劫今身七丗父母或沉或滯巳生未生升入法門衆惡萬緣一時解脫超凡入聖合道成真稽首十方正真三寶地獄品爾時妙行真人稽首上白曰衆品妙議咸所聞知未審地獄苦處復有幾種輕重若何太上曰所修既有等差地獄豈無輕重但人死之時地司關奏上界諸天帝王三元四司定其罪目輕重有配復稽首敬問曰死者皆經地獄否太上答曰若積習善行有諸功德上天巳録生簡便即轉形還生福報豈復更經地獄也但積惡之人命過之後當受對報或入酆都泰山二十六地獄或入九幽十八地獄或入東方風雷地獄或入南方火翳地獄或入西方金刀地獄或入北方寒冰地獄或入東北方鞭捶地獄或入東南方焦然地獄或入西南方熱鐵牀地獄或入西北方鑊湯地獄或入中央斧鉞地獄或入下方糞穢地獄或入監天地獄或入平天地獄或入自然地獄或入九平地獄或入青詔地獄或入玄天地獄或入九正地獄或入玄沙地獄或入皇天地獄或入禁伐地獄或入北玄地獄或入律令地獄或入無間地獄或入女青地獄或入天乙地獄或入太幽玄地獄或入五嶽之獄或入四海九河之獄如是等獄幽牢苦閉長夜寒庭猛焰飛風疾雷驚震鋒刀劒戟鐵杖金鎚銅柱鐵牀身抱體卧毒禽猛獸霜牙雪齒互加考責以至灰河萬𣲖毒浪千尋浸漬其間切楚何極長驅猛吏執罰神兵百億萬衆種種拷掠一日之中萬死萬生當此之時追悔何及動經一劫罪畢受生或作驢牛騾馬令人乘駕或作羽毛鱗甲令人屠戮受此報巳方作人身復又愚癡醜陋神識不具唯處下劣手足虧折眼目盲瞽聾啞顛邪苦疾加至飢寒凍餓衣食不充刑法備加常在苦地稍異畜類未嘗安處皆自先業何由逃避若無懴悔安能免之是故歸命一心丹倒苦切奉為師尊父母宗親眷屬次及某乙逺洎一切衆生懴除地獄信禮大慈無上尊志心信禮大聖至真元始天尊志心信禮玄一天尊志心信禮住元相天尊志心信禮揮神妙用天尊志心信禮羣靈普衛天尊志心信禮玄臺勤德天尊志心信禮髙定智天尊志心信禮默念無為天尊志心信禮勝華潛耀天尊志心信禮遊寂處天尊志心信禮紫府凝神天尊志心信禮澄真淨天尊志心信禮紫極微觀天尊志心信禮太虛常寂天尊志心信禮杳冥神化天尊志心信禮至極安樂天尊志心信禮最勝天尊志心信禮端靖和光天尊志心信禮華廣德天尊志心信禮清淨真天尊志心信禮和光隱妙天尊志心信禮超冥際天尊志心信禮度八難天尊志心信禮乘景浮空天尊志心信禮凝神生慧天尊志心信禮湛相淳寂天尊志心信禮極虛感天尊志心信禮度幽海天尊志心信禮飛形相天尊志心信禮體真實天尊志心信禮消魔試天尊志心信禮悟劫天尊志心信禮玄宫治天尊志心信禮朝宴槫桑天尊志心信禮寧撫萬神天尊志心信禮妙力寶真天尊志心信禮南丹慧天尊志心信禮開玄隱天尊志心信禮啓神化天尊志心信禮百莊嚴天尊志心信禮大慈悲救苦真人志心信禮大慈悲拔罪真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人歸依十方無上天尊諸大真聖某乙洎師守父毋宗親眷屬逺及一切衆生自從無始以來至于今日曽未覺悟動積𡨚愆尚慮命過之後入此諸大地獄受斯責報得無畏悚並願從今一懴盡得消除苦趣不經善緣增長亡者受生幽牢罷對快樂自然永離惡道稽首十方正真三寶發願品太上告妙行真人曰吾向所宣妙義一一罪福各有等差一一修行皆示要徑一一法門普皆開闢所以為衆生而言也言直而理顯文通而義貫除迷破疑超凡入聖盡在於此由專誠取悟而巳而常念一切衆生不能廣發大願心心濟物念念度人或人或天皆起平等至于身心口意耳鼻舌根常能清淨堅固不退動作卧息皆能行之損此利他先人後巳積功於身常行洗懴罪根既滅善芽日生可不妙哉敬禮慈尊次發大願志心信禮大聖至真元始天尊志心信禮通幽致理天尊志心信禮五雲浮駕天尊志心信禮七寶林天尊志心信禮愍愛一切天尊志心信禮定空法藏天尊志心信禮紫陽寶印天尊志心信禮凝真妙趣天尊志心信禮圓滿智天尊志心信禮玄獨悟天尊志心信禮垂法教天尊志心信禮瓊文受命天尊志心信禮元洞恬淨天尊志心信禮玉清金相天尊志心信禮無滯著天尊志心信禮雲蔭無極天尊志心信禮真源潤天尊志心信禮隨緣會天尊志心信禮平育無際天尊志心信禮清穆休光天尊志心信禮超形物外天尊志心信禮影化虛宫天尊志心信禮人天自在天尊志心信禮上靈壽天尊志心信禮大霄賔廷天尊志心信禮朱蓮妙相天尊志心信禮左玄臻粹天尊志心信禮皓氣淩霄天尊志心信禮太素分形天尊志心信禮智先萬物天尊志心信禮耀無邊天尊志心信禮丹霞舒彩天尊志心信禮浮玉光天尊志心信禮宴鼇島天尊志心信禮紫陽卿天尊志心信禮玄真舉集天尊志心信禮天璆振韻天尊志心信禮妙宥天尊志心信禮妙教天尊志心信禮龍駕行天尊志心信禮大慈悲救苦真人志心信禮大慈悲太極真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人巳上敬禮足十方大慈應號天尊一千二百大慈悲真人一百二十重復稽首歸依以此無量善功無邊真誥今日某乙發無上道心奉為師尊父母宗親眷屬以及三塗五苦九幽六道乃至飛走蠕動蠢蠢含生發大誓願願大道興化法教流通一切生民皆得聞見悟道成真獲種種福願天地長久覆載無窮日月星辰照臨無極循環合度運轉無虧願國王平等動合道意君臣和慶祚嗣昌隆願九州清肅永息妖氛四海澄寧華夷大化願四時順序百穀豐盈民俗阜安災殃不起願山川呈瑞土地和宜五行舒調萬物蕃盛願一切大地鬼神咸發道心得成正道願江海龍王山川龍王各起善心利濟一切輪升品位願大地山精石魅土木百怪更形變質悟善歸真願一切飛走蠕動各生靈性願善信男女道心堅固升入法門女轉男身聰明自在願山棲市隱學道求仙真心常固速入大乘願沉痾苦疾克得安寧喑啞盲聾聰明通利拳攣跛躃申息自在願一切三業生生覺悟莫起惡根免墮苦處願怨結𡨚憎皆得解釋愚癡者克得智慧慳貪者克能捨利散慢者克生恭敬施捨者心心不退善事者速皆成就願一切衆生覺悟幻身修真正身捨煩惱身得端正身捨愛欲身得快樂身捨罪業身得福報身捨有漏身得無礙身捨𡨚纏身得逍遙身捨天短身得長壽身又願一切衆生覺悟本心從無明中來捨瞋怒心生歡喜心捨嫉妬心生和恱心捨癡惡心生慈慧心捨殺害心生愍恤心捨慳貪心生歸向心去虛妄心生真實心又願一切衆生覺悟情意從隂中來去鄙惡情意生廣大情意去憂惱情意生恬暢情意去嗜欲情意生真淨情意去邪佞情意生正真情意又願一切衆生覺悟其口從無猒中來去貪味口得常誦真經口去破善長惡口得講論真義口去兩舌鬬亂口得慈悲平等口去呪咀是非口得讃歎歌詠口又願一切衆生捨愛欲眼得智慧眼捨瞋怒眼生慈悲眼去視惡眼生覩善眼去窺覷眼生正道眼又願一切衆生捨聞惡耳得親善耳捨淫樂耳得清淨耳捨不淨耳得諦受經法耳又願一切衆生鼻去雜息常得天供名香妙花之氣又願一切衆生去諸邪惡妄動虛假不正之想常得雅直專一之想又願一切衆生無病無惱無輪無化無飢無渴無禍無迍無寒無熱無厄無苦常得安樂又願一切𡨚憎負命負財負仁負義永斷牽纏各獲自在又願一切枷鎖牢獄危難苦厄並得消除又願一切惡人悉起善心一切三災水得消釋願十方地獄變為十極淨地諸大地獄變作無量寶界願地獄驚震化作仙樂地獄猛火化為涼風地獄寒冰變為春煦地獄膏鑊化成蓮池地獄沸湯化為法水地獄刀山變為蓮峯地獄戈戟化為旌節地獄火車化作寶輦地獄灰河化為瑶池地獄苦輪化作法輪地獄業風化為清籟地獄糞穢化作香山地獄吞火食炭變為甘露入心硤石逼身化作雲梯接道地獄苦處盡成樂國愛河之上霞作橋梁苦海之中雲為舟楫地獄罪籍悉皆消廢受苦衆生一時解脫地獄鬼官升為仙官地獄鬼神升為仙侣又願某乙生生丗丗受身捨身發此願心堅固不退天地可終此願無終劫運可盡此願不盡陵谷可遷此願不遷川瀆可竭此願不竭人天共仰生死同依同會正真成無上道爾時妙行真人聞是因緣稽首作禮而作頌曰至聖開祕粹度脫諸人天大願劫不盡功德玄中玄生死皆快樂魔王自保全無可無不可共成無上仙元始天尊説經既畢仙韶大舉真聖導從即還上宫十方清肅於是妙行真人諸天帝王及諸真衆歡喜作禮要當奉行流通救度各各以龍書鳳篆金函玉藴題云太上靈寶十方應號天尊經懴稽首十方正真三寶太上靈寶十方應號天尊懴卷之十
