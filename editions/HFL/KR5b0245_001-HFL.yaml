body:
  text: 懴殺生品太上告妙行真人曰一切衆生過去見存不念慈悲殺害衆生啖食無猒或爲父母以及已身子孫眷屬追隨凶吉聚集郷閭殺害衆生不可稱計或享祀祖先祈賽社竈殺害衆生亦不可計或殺牛羊猪狗驢馬鷄㹠依人牧養之類或殺麞鹿狐兔虎豹豺狼山林野獸之類或殺鵝鴨烏鵲鳩鴿鴟鳶鳬鶩鵁鶄飛禽之屬或殺蟲蛇虺蝎蜂蠆蚰蜒蜈蚣蜙蝑螻蟻之類或殺黿鼈龜鼉魚鰕鱣蟹螺蚌蟆蛤水蟲之類或殺蜣蜋蠛蠓負蝂螟蛉蚯蚓小蟲之𩔖或殺蚊䗈蚤蝨蜉蝣蚳蝝𧍒蛸化生之屬或飛鷹馳犬窮林竭澤殺害衆生或張羅布網放火燒山殺害衆生或持弓抨矢操刀執杖殺害衆生或坐卧行立手揉足踏殺害衆生或起造宅舍修築垣壁殺害衆生或耕田播埴穿坑出土殺害衆生或薙草平地採樵伐木殺害衆生或摘花挽果生蠶曝蠒殺害衆生或然燈𤑔火背明向暗殺害衆生或引水入穴熱湯潑地殺害衆生飲水食飯沐髮浴身殺害衆生剖胎破卵傷筋斷骨殺害衆生或開口舉意伸手動足殺害衆生或對天尊大道真經妙法一切聖賢殺害衆生或於天地三光之下殺害衆生或於三元八節十直齋日及風雨暝晦殺害衆生或於玄壇靈觀道場法座殺害衆生或因瞋怒愁惱歡樂歌舞殺害衆生或合和湯藥救療病苦殺害衆生或命絶手中身亡刀下或因征進或爲仇讎或倚豪强或恃財勢或斷其頭足剥去皮毛猛火煎燒沸湯潯煑或生分子母斷其胎育或攻絶命根令其磨滅或恐殺怖殺毒藥殺呪罵殺或自殺教他殺故殺誤殺口殺意殺心殺看殺傳言遣殺如是等事隱蔽在身未曽發露若無懴悔永劫縈纏歸命䖍誠謹當信禮志心信禮大聖至真元始天尊志心信禮清都闡妙天尊志心信禮乾坤開度天尊志心信禮穹崇勝蓋天尊志心信禮轉輪自在天尊志心信禮超淩上境天尊志心信禮回靈感天尊志心信禮逍遥太虚天尊志心信禮廣大玄功天尊志心信禮日月照天尊志心信禮紫府垂惠天尊志心信禮制威魔天尊志心信禮受煉更生天尊志心信禮髙妙天尊志心信禮大威力天尊志心信禮梵形天尊志心信禮柏空慧天尊志心信禮度仙髙妙天尊志心信禮教化萬物天尊志心信禮常樂導天尊志心信禮玉華靈耀天尊志心信禮玄穹垂化天尊志心信禮金顔天尊志心信禮受經藴天尊志心信禮散流威德天尊志心信禮至聖覃恩天尊志心信禮識宿命天尊志心信禮入法門天尊志心信禮靜氣天尊志心信禮洞觀妙天尊志心信禮九靈自在天尊志心信禮天門髙偁天尊志心信禮龍輿下濟天尊志心信禮慈悲五苦天尊志心信禮香光德天尊志心信禮寳相歡喜天尊志心信禮軫念塗炭天尊志心信禮能度脫樊籠天尊志心信禮龍音慈救天尊志心信禮无礙清淨相天尊志心信禮大慈悲救苦真人志心信禮大慈悲太極真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人歸依十方无上天尊諸大真聖某乙自從无量劫來捨身受身或曽犯如上殺生之罪又或先祖父毋子孫眷屬所犯如上殺生之罪合逮及見今某乙今日仰憑大慈之恩咸得洗懴𡨚對解脫善縁增長所殺一切毛羣羽族蠕動之𩔖仗此殊功並各生化度脫逍遥稽首十方正真三寳懴三業品太上告妙行真人曰一切衆生沉淪惡道无由解脫者皆因身心口三業所犯一者身業之罪不念己身受二儀陶育三光臨照四時資養五行生成而不知荷戴愧畏不念己身受父毋長養師尊教授而不持孝奉不念己身受國王大臣之庇化不生忠敬不念己身受一切聖賢掌括罪福録籍而不信善惡報對謂其自然長存不覺不知不畏不悔不戒不慎唯貪細滑多受惡觸殺盜邪淫不可勝計非法亂常酗酒自恣二者心業之罪無明之火終日煎燒六情三惑馳競無猒萬惡之由自兹始也或起偷盜上聖髙尊真經祕籙靈祠淨境園林花果供養法物等心或起偷盜君國倉庫賢人長者以及卑賤愚劣一切等物之心凡百之物起一念心皆爲偷盜妄想好惡生於内善惡報對起於外又或起違負三光輕量衆聖心或起隂謀私計枉陷善人心或起殺害衆生故傷物命心或起諂曲狡僞奸宄誣罔心或起嫉人勝己妬忌自恃心或起教人作惡令犯不義心或起敗人成功破人作善心或起離人骨肉隔人恩愛心或起違經背法破齋犯戒心或見一切形質起諸慾心或於一切凡聖起諸愚癡心或起背真向僞信邪倒見心或起自任愚鄙不從善化心或起損彼利此害他自饒心或起瞋怒憎嫌慳貪戲弄心或起與人一失忘其平昔恩義心或起毒語害人美言致禍心或起妄動夢想放蕩不正心或起口是心非面譽背毀心或起急即歸依退無回向心如是一切非平等心衆生日有三者口業之罪一切男女累積口過與劫齊深或啗食五味葷辛血肉充養形骸不生慚愧而無猒足終日自恣惡口兩舌誑妄是非或於至真大道天地三光寳經妙法賢人長者師尊父毋髙下貧富鬼神幽顯行於華言綺語曽無信實凡詞呪咀惡語誣毀呵風罵雨叱咤尊卑調謔愚智善言惡對好結𡨚非邪言侮人巧詞惑衆評量美惡鬬亂親踈詐僞作真愛虚成實論人之短說己之長添人咎恨欲進其身誇誕姧邪抑屈良善雖誦經教内懷矯妄曽不歸依自言功德且夫至神聦直安在諂求祈禱無靈便生謗毀三業之罪頃刻不無不知積重沉舟積惡墮巳今日歸誠願皆懴悔志心信禮大聖至真元始天尊志心信禮資益善縁天尊志心信禮飛歩朱宫天尊志心信禮長樂身天尊志心信禮大妙髙玄天尊志心信禮沖昇金闕天尊志心信禮大信惠天尊志心信禮出世因縁天尊志心信禮金臺清淨光天尊志心信禮德自在天尊志心信禮太極無名天尊志心信禮靈元天尊志心信禮寳明天尊志心信禮善香天尊志心信禮咸承慧日天尊志心信禮端靖真相天尊志心信禮普扇真風天尊志心信禮善觀妙天尊志心信禮金憧天尊志心信禮善意願天尊志心信禮大光明天尊志心信禮威德清淨天尊志心信禮玄慈拯濟天尊志心信禮寳光照无極天尊志心信禮師子威儀天尊志心信禮功德通王天尊志心信禮普明觀天尊志心信禮无憂德天尊志心信禮破煩惱光明天尊志心信禮常靜黙天尊志心信禮增益方便天尊志心信禮栴檀德王天尊志心信禮純寳藏天尊志心信禮寳辯天尊志心信禮光明徧冥際天尊志心信禮開通聖力天尊志心信禮虚空相天尊志心信禮仙靈含素天尊志心信禮五雲騰迹天尊志心信禮念羣迷天尊志心信禮大慈悲救苦真人志心信禮大慈悲拔罪真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人歸命十方无上天尊諸大真聖某乙自從无量劫來捨身受身至于今日所犯三業之罪无量无邊隱蔽在身又或先代所犯罪及見今某乙受苦報者仰憑大慈之恩願垂拯拔三業原除六根清淨免值九幽之下風刀考身鐵㦸撞心洋銅灌口拔舌之罪並希度脫稽首十方正真三寳釋怨品太上告妙行真人曰沉淪惡道生死苦惱卒難解脫展轉對報者無如怨結之罪深重也一切衆生在棄賢世界未能悟解善道終日孜孜増長其業不知怨恨於身無益但自目前見事發諸無明或中心含蓄空撓方寺殊不知天地虚空司命司察及人身中司過之神録其憤恨奏上天宫定其罪目救下陰司一入惡道備受苦趣再生人中又相讎一劫劫生生無有窮巳皆由自作自受如形有影何能逃避所以至人大則捨位捨身小則捐華割愛謹守空寂不競人我正爲去此怨恨也且縁人於至親固合孝愛深重反不和樂者多皆是宿世怨恨之重故令今生如此且爲人師尊父母在長在上者多責望其事奉報效小不如宜則生怨恨爲人子孫眷屬者多所望其恩愛䕃育如其不及則怨恨生若無責望怨恨何有或於天地三光髙真上聖生於怨恨風雨雷電祁寒暑熱生於怨恨君親師長六親眷屬生於怨恨田園家宅五榖五味生諸怨恨麻帛綵紈果實蔬茹生諸怨恨朋友交執爭名競利生諸怨恨經求市易入賤出貴生諸怨恨公私訟理巧文曲詞生諸怨恨酒色博弈不辯賢愚生諸怨恨是非得失不持謙和生諸怨恨取人長錢還人短陌空諸怨恨不憐老病不念貧窮生諸怨恨呪罵人物鞭撻人畜生諸怨恨阻人口腹絶人恩愛生諸怨恨慳貪恡惜嫉人勝已生諸怨恨減人自益危人自安生諸怨恨清弱暴寡捨遺取施生諸怨恨輕秤小㪷狹幅短度生諸怨恨施人求報受恩不感生諸怨恨辱人求勝敗人好事生諸怨恨使役人畜不念勞苦生諸怨恨恃其無明小不如意則狠毒呪詈欲其速死速滅萬惱百惡生生世世令彼所受未爲足意又有懷其怨恨藴在心中無復發露没齒不解至于冥司方能對報所以怨恨難解者如其結縛若無懴悔難於解免展轉不絶深可痛哉但自退思怨恨憤切從無入有秪積業根勸諸衆生早當悟解速宜攺悔免結縈纏彼我都忘怨恨何有激切一心謹當信禮志心信禮大聖至真元始天尊志心信禮髙上太虚天尊志心信禮普示玄德天尊志心信禮九氣頥生天尊志心信禮玄微淵湛天尊志心信禮妙淨隆德天尊志心信禮真尊康妙天尊志心信禮常護持天尊志心信禮垂法應形天尊志心信禮隨機降福天尊志心信禮廣通玄天尊志心信禮妙尊髙天尊志心信禮闡揚玄化天尊志心信禮含真顯慧天尊志心信禮叅玄入妙天尊志心信禮廣行天尊志心信禮无視聽天尊志心信禮大隱宣慈天尊志心信禮布玄化天尊志心信禮太素凝和天尊志心信禮萬真齊證天尊志心信禮清真發耀天尊志心信禮智無極天尊志心信禮玄衆真天尊志心信禮寳雲垂妙天尊志心信禮制劫運天尊志心信禮法澤被无邊天尊志心信禮玄極光化天尊志心信禮功德圓滿天尊志心信禮拔衆苦天尊志心信禮无上至真王天尊志心信禮玉輝相天尊志心信禮通幽顯天尊志心信禮垂象外天尊志心信禮洞清冥天尊志心信禮常拯世難天尊志心信禮玄大法音天尊志心信禮真身定天尊志心信禮濟十苦天尊志心信禮離垢愛天尊志心信禮大慈悲救苦真人志心信禮大慈悲滅罪真人志心信禮大慈悲普濟真人志心信禮大慈悲妙行真人歸依十方无上天尊諸大真聖今日奉爲某乙兼及過去父母祖先師長眷屬以至九幽六道一切衆生志心禮懴滅除前件怨恨之罪俱得解脫各當思省未來之事不更造作免其世世生生怨報无巳或沉或滯或人或天惡根永斷逍遥適樂無復纏綿稽首十方无上正真三寳太上靈寳十方應號天尊懴卷之二
