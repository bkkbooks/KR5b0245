front:
  text: 太上靈寶十方應號天尊懴卷之二原缺卷一卷三之九爾時妙行真人聞太上說善惡因緣報對事巳禮拜讃歎至誠苦切重白太上曰衆生愚癡沉迷世網不能自覺得免罪中流轉生死常處苦處上望慈尊願見開悟使來生男女歸心善道不落三塗太上曰一切衆生捨身受身無量劫來身心情意眼耳鼻口搆成諸罪沉迷觸法內造外造六情互起更遞相生罪根增長念念成非有無量之罪數等塵沙結習來久總在身中先緣今緣從劫至劫不可記識一念歸心皆得清淨猶如明鏡前後塵垢諸雜不淨積聚蔽翳內外濛暗若一旦遇其良匠拂拭磨洗表裏光徹洞照遠近明淨如初何以故本來明淨者也衆生亦然神本清淨無諸滓穢但受形之後內外塵垢漸染成愆六根六欲六情六入六染六賊六塵六識分别是非妄作穢弊內暗外滋失其真性流浪死生動成罪因報對相緣便入地獄受諸苦惱萬劫沉淪吾以慈悲憐念衆生故從劫至劫變化人間或聖或凡種種應身方便教化流傳經戒開悟度脫使出苦惱而衆生薄福不能覺悟且諸天上聖神仙真衆常欲人滌惡生善則善神祐衛若罪結在身不知懴悔則惡神禍之生死受苦一切衆生唯知外飾面目衣服手足而不知內洗身心以免罪結若如面目手足衣服之類勤加洗潔則善必有歸咎將何及今重分别各當懴悔
